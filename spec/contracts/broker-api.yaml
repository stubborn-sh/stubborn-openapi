          format: uuid
        eventType:
          $ref: '#/components/schemas/EventType'
        requestUrl:
          type: string
        requestBody:
          type: string
        responseStatus:
          type: integer
        responseBody:
          type: string
        success:
          type: boolean
        errorMessage:
          type: string
        executedAt:
          type: string
          format: date-time

    WebhookExecutionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/WebhookExecutionResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    EventType:
      type: string
      enum:
        - CONTRACT_PUBLISHED
        - VERIFICATION_PUBLISHED
        - VERIFICATION_SUCCEEDED
        - VERIFICATION_FAILED
        - DEPLOYMENT_RECORDED

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          type: object
          additionalProperties:
            type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
    sort:
      name: sort
      in: query
      description: Sort field and direction (e.g. createdAt,desc)
      schema:
        type: string
    search:
      name: search
      in: query
      description: Case-insensitive search filter (matches name, description, or URL depending on resource)
      schema:
        type: string

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - basicAuth: []
  - bearerAuth: []
