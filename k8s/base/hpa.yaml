apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stubborn-broker
  labels:
    app.kubernetes.io/name: stubborn-broker
    app.kubernetes.io/part-of: stubborn-broker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stubborn-broker
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
