apiVersion: v1
kind: Secret
metadata:
  name: stubborn-broker
  labels:
    app.kubernetes.io/name: stubborn-broker
    app.kubernetes.io/part-of: stubborn-broker
type: Opaque
stringData:
  # Database credentials — replace with actual values or use sealed-secrets / external-secrets
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/broker"
  SPRING_DATASOURCE_USERNAME: "broker"
  SPRING_DATASOURCE_PASSWORD: "changeme"
  # Uncomment and set when Spring Security user auth is needed:
  # SPRING_SECURITY_USER_NAME: "admin"
  # SPRING_SECURITY_USER_PASSWORD: "changeme"
