apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: stubborn-broker
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stubborn-broker
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: stubborn-broker
                resources:
                  requests:
                    memory: "512Mi"
                    cpu: "500m"
                  limits:
                    memory: "1Gi"
                    cpu: "1000m"
  - target:
      kind: ConfigMap
      name: stubborn-broker
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: stubborn-broker
      data:
        SPRING_PROFILES_ACTIVE: "prod"
  - target:
      kind: HorizontalPodAutoscaler
      name: stubborn-broker
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: stubborn-broker
      spec:
        maxReplicas: 10

commonLabels:
  app.kubernetes.io/name: stubborn-broker
  app.kubernetes.io/part-of: stubborn-broker
  app.kubernetes.io/managed-by: kustomize
  environment: prod
