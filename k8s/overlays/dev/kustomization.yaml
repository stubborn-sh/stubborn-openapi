apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: stubborn-broker
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stubborn-broker
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: stubborn-broker
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "125m"
                  limits:
                    memory: "256Mi"
                    cpu: "250m"
  - target:
      kind: ConfigMap
      name: stubborn-broker
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: stubborn-broker
      data:
        SPRING_PROFILES_ACTIVE: "dev"

commonLabels:
  app.kubernetes.io/name: stubborn-broker
  app.kubernetes.io/part-of: stubborn-broker
  app.kubernetes.io/managed-by: kustomize
  environment: dev
