suite: Service tests
templates:
  - templates/service.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service

  - it: should use ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should set service port from values
    set:
      service.port: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should target http port
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: should have correct selector labels
    asserts:
      - isNotEmpty:
          path: spec.selector
