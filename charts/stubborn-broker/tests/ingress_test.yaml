suite: Ingress tests
templates:
  - templates/ingress.yaml
tests:
  - it: should not render when ingress is disabled
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when ingress is enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: broker.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress

  - it: should set ingressClassName
    set:
      ingress.enabled: true
      ingress.className: nginx
      ingress.hosts:
        - host: broker.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should configure host and path
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: broker.example.com
          paths:
            - path: /api
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].host
          value: broker.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
