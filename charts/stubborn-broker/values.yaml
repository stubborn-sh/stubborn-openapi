replicaCount: 2

image:
  repository: stubborn-broker
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: broker.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

postgresql:
  host: postgresql
  port: 5432
  database: broker
  username: broker
  password: changeme
  existingSecret: ""

spring:
  profiles: prod

observability:
  otlp:
    endpoint: http://localhost:4318/v1/traces
    metricsEnabled: false

serviceAccount:
  create: true
  name: ""
  annotations: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 1
