apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "stubborn-broker.fullname" . }}-test-connection"
  labels:
    {{- include "stubborn-broker.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ include "stubborn-broker.fullname" . }}:{{ .Values.service.port }}/actuator/health']
  restartPolicy: Never
