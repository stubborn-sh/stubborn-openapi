name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.0.2)'
        required: true
      next-snapshot:
        description: 'Next SNAPSHOT version'
        required: true
        default: '0.0.3-SNAPSHOT'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'liberica'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set release version
        run: ./mvnw versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false -q

      - name: Build and test
        run: ./mvnw install -B

      - name: Deploy to Maven Central
        run: ./mvnw deploy -Ppublish,release -DskipTests -B
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push && git push --tags

      - name: Back to SNAPSHOT
        run: |
          ./mvnw versions:set -DnewVersion=${{ inputs.next-snapshot }} -DgenerateBackupPoms=false -q
          git add -A
          git commit -m "Back to ${{ inputs.next-snapshot }}"
          git push
